name: Build Windows Installer

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run make

      - name: Smoke-test installer (silent install + launch)
        shell: pwsh
        run: |
          $setup = Get-ChildItem -Recurse -Path out/make -Filter 'IPTV-Player-Setup.exe' | Select-Object -First 1
          if (-not $setup) { throw "Setup.exe not found under out/make" }
          Write-Host "Installer: $($setup.FullName) ($([math]::Round($setup.Length/1MB,1)) MB)"

          Write-Host "Running silent install…"
          Start-Process -FilePath $setup.FullName -ArgumentList '--silent' -Wait

          $installDir = Join-Path $env:LOCALAPPDATA 'iptv_player'
          if (-not (Test-Path $installDir)) { throw "Install directory not found: $installDir" }
          # The real app lives in app-<version>\ ; the root exe is only a Squirrel stub.
          $exe = Get-ChildItem -Recurse -Path $installDir -Filter 'iptv-player.exe' |
                 Where-Object { $_.FullName -match '\\app-' } | Select-Object -First 1
          if (-not $exe) { throw "Versioned app executable (app-*\iptv-player.exe) not found under $installDir" }
          Write-Host "✔ Installed: $($exe.FullName)"

          Write-Host "Launching app to verify it boots…"
          $p = Start-Process -FilePath $exe.FullName -ArgumentList '--no-sandbox' -PassThru
          Start-Sleep -Seconds 20
          if ($p.HasExited) { throw "App exited immediately (exit code $($p.ExitCode)) — boot failed" }
          Write-Host "✔ App still running (pid $($p.Id)) after 20s — boot OK"
          Stop-Process -Id $p.Id -Force -ErrorAction SilentlyContinue

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-player-windows-installer
          path: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
            out/make/squirrel.windows/**/RELEASES
          if-no-files-found: error

      - name: Publish release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
            out/make/squirrel.windows/**/RELEASES
